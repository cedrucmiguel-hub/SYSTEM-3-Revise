version: "3.9"

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    environment:
      NODE_ENV: production
      USE_EMBEDDED_BACKEND: "false"
      BACKEND_URL: http://backend:4000
      NEXT_PUBLIC_BACKEND_URL: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../services/backend-nest
      dockerfile: ../../docker/Dockerfile.backend-nest
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["optional"]

  worker:
    image: node:20-alpine
    profiles: ["optional"]
    working_dir: /app
    volumes:
      - .:/app
    command: ["sh", "-lc", "echo worker placeholder"]
